steps:
  # Build the backend image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/reader-backend', './backend']
    id: 'Build Backend'

  # Build the frontend image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/reader-frontend', './frontend']
    id: 'Build Frontend'

  # Push the backend image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/reader-backend']
    id: 'Push Backend'

  # Push the frontend image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/reader-frontend']
    id: 'Push Frontend'

images:
  - 'gcr.io/$PROJECT_ID/reader-backend'
  - 'gcr.io/$PROJECT_ID/reader-frontend'

substitutions:
  _REGION: us-central1
